groups:
- name: prometheus-operator
  rules:
  - alert: prometheusoperatorsyncfailed
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: min_over_time(prometheus_operator_syncs{status="failed",job="kube-prometheus-stack-operator",namespace="prometheus"}[5m])
      > 0
    for: 10m
    annotations:
      description: Controller {{ $labels.controller }} in {{ $labels.namespace }}
        namespace fails to reconcile {{ $value }} objects.
      runbook_url: default_runbook_url
      summary: Last controller reconciliation failed
      dashboard_url: default_dashboard_url
