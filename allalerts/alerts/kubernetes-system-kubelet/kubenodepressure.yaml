groups:
- name: kubernetes-system-kubelet
  rules:
  - alert: kubenodepressure
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: 'kube_node_status_condition{job="kube-state-metrics",condition=~"(MemoryPressure|DiskPressure|PIDPressure)",status="true"}
      == 1

      and on (cluster, node)

      kube_node_spec_unschedulable{job="kube-state-metrics"} == 0'
    for: 10m
    annotations:
      description: '{{ $labels.node }} on cluster {{ $labels.cluster }} has active
        Condition {{ $labels.condition }}. This is caused by resource usage exceeding
        eviction thresholds.'
      runbook_url: default_runbook_url
      summary: Node has as active Condition.
      dashboard_url: default_dashboard_url
