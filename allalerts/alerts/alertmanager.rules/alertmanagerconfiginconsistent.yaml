groups:
- name: alertmanager.rules
  rules:
  - alert: alertmanagerconfiginconsistent
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: "count by (namespace,service,cluster) (\n  count_values by (namespace,service,cluster)\
      \ (\"config_hash\", alertmanager_config_hash{job=\"kube-prometheus-stack-alertmanager\"\
      ,container=\"alertmanager\",namespace=\"prometheus\"})\n)\n!= 1"
    for: 20m
    annotations:
      description: Alertmanager instances within the {{$labels.job}} cluster have
        different configurations.
      runbook_url: default_runbook_url
      summary: Alertmanager instances within the same cluster have different configurations.
      dashboard_url: default_dashboard_url
