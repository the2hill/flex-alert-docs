groups:
- name: fluentbit_servicemonitor_alert
  rules:
  - alert: missingfluentbitservicemonitor
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: count(up{job="fluentbit-fluent-bit"}) == 0
    for: 1m
    annotations:
      description: 'Check if the Fluentbit ServiceMonitor is properly configured and
        deployed.

        '
      summary: ServiceMonitor 'fluentbit-fluent-bit' is either down or missing.
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
