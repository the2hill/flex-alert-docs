groups:
- name: ovn_backup_alerts
  rules:
  - alert: ovnbackupuploadwarning
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: time() - upload_pairs_success_timestamp{job="ovn-backup"} > 21600
    for: 1h
    annotations:
      description: 'Last OVN backup not uploaded within 1 hour of scheduled run.

        '
      summary: Last OVN backup not uploaded within 1 hour of scheduled run
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
