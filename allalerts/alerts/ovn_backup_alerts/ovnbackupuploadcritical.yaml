groups:
- name: ovn_backup_alerts
  rules:
  - alert: ovnbackupuploadcritical
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: time() - upload_pairs_success_timestamp{job="ovn-backup"} > 43200
    for: 1h
    annotations:
      description: 'Second successive OVN backup not uploaded within 1 hour of scheduled
        run.

        '
      summary: Second successive OVN backup not uploaded within 1 hour of scheduled
        run
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
