groups:
- name: etcd
  rules:
  - alert: etcdmembersdown
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: "max without (endpoint) (\n  sum without (instance, pod) (up{job=~\".*etcd.*\"\
      } == bool 0)\nor\n  count without (To) (\n    sum without (instance, pod) (rate(etcd_network_peer_sent_failures_total{job=~\"\
      .*etcd.*\"}[120s])) > 0.01\n  )\n)\n> 0"
    for: 20m
    annotations:
      description: 'etcd cluster "{{ $labels.job }}": members are down ({{ $value
        }}).'
      summary: etcd cluster members are down.
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
