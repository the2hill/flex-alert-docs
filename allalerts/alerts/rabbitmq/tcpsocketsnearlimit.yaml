groups:
- name: rabbitmq
  rules:
  - alert: tcpsocketsnearlimit
    labels:
      rulesgroup: rabbitmq
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: 'sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (max_over_time(rabbitmq_process_open_tcp_sockets[5m])
      * on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

      /

      sum by(namespace, rabbitmq_cluster, pod, rabbitmq_node) (rabbitmq_process_max_tcp_sockets  *
      on(instance) group_left(rabbitmq_cluster, rabbitmq_node, pod) rabbitmq_identity_info)

      > 0.8

      '
    for: 10m
    annotations:
      description: '`{{ $value | humanizePercentage }}` TCP sockets of TCP socket

        limit are open in RabbitMQ node `{{ $labels.rabbitmq_node }}`, pod `{{ $labels.pod
        }}`,

        RabbitMQ cluster `{{ $labels.rabbitmq_cluster }}`, namespace `{{ $labels.namespace
        }}`.

        '
      summary: 'More than 80% of TCP sockets are open on the RabbitMQ node.

        When this value reaches 100%, new connections will not be accepted.

        Client libraries, peer nodes and CLI tools will not be able to connect when
        the node runs out of available TCP sockets.

        See https://www.rabbitmq.com/networking.html.

        '
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
