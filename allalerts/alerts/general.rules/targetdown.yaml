groups:
- name: general.rules
  rules:
  - alert: targetdown
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: 100 * (count(up == 0) BY (cluster, job, namespace, service) / count(up)
      BY (cluster, job, namespace, service)) > 10
    for: 10m
    annotations:
      description: '{{ printf "%.4g" $value }}% of the {{ $labels.job }}/{{ $labels.service
        }} targets in {{ $labels.namespace }} namespace are down.'
      runbook_url: default_runbook_url
      summary: One or more targets are unreachable.
      dashboard_url: default_dashboard_url
