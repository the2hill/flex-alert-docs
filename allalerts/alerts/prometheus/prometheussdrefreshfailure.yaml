groups:
- name: prometheus
  rules:
  - alert: prometheussdrefreshfailure
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: increase(prometheus_sd_refresh_failures_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[10m])
      > 0
    for: 20m
    annotations:
      description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has failed to
        refresh SD with mechanism {{$labels.mechanism}}.
      runbook_url: default_runbook_url
      summary: Failed Prometheus SD refresh.
      dashboard_url: default_dashboard_url
