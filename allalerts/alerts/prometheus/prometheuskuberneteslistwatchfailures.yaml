groups:
- name: prometheus
  rules:
  - alert: prometheuskuberneteslistwatchfailures
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: increase(prometheus_sd_kubernetes_failures_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m])
      > 0
    for: 15m
    annotations:
      description: Kubernetes service discovery of Prometheus {{$labels.namespace}}/{{$labels.pod}}
        is experiencing {{ printf "%.0f" $value }} failures with LIST/WATCH requests
        to the Kubernetes API in the last 5 minutes.
      runbook_url: default_runbook_url
      summary: Requests in Kubernetes SD are failing.
      dashboard_url: default_dashboard_url
