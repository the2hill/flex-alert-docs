groups:
- name: prometheus
  rules:
  - alert: prometheusmissingruleevaluations
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: increase(prometheus_rule_group_iterations_missed_total{job="kube-prometheus-stack-prometheus",namespace="prometheus"}[5m])
      > 0
    for: 15m
    annotations:
      description: Prometheus {{$labels.namespace}}/{{$labels.pod}} has missed {{
        printf "%.0f" $value }} rule group evaluations in the last 5m.
      runbook_url: default_runbook_url
      summary: Prometheus is missing rule evaluations due to slow rule group evaluation.
      dashboard_url: default_dashboard_url
