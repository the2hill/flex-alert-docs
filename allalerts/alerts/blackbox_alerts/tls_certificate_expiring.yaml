groups:
- name: blackbox_alerts
  rules:
  - alert: tls_certificate_expiring
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: (probe_ssl_earliest_cert_expiry - time()) / 86400 < 15
    for: 0m
    annotations:
      description: 'SSL certificate expires within 15 days.

        VALUE = {{ $value }}

        LABELS = {{ $labels }}

        '
      summary: SSL certificate will expire soon on (instance {{ $labels.instance }})
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
