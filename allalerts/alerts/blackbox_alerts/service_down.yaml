groups:
- name: blackbox_alerts
  rules:
  - alert: service_down
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: probe_success == 0
    for: 2m
    annotations:
      description: 'Service probe has failed for more than two minutes.

        LABELS = {{ $labels }}

        '
      summary: Service probe has failed for more than two minutes on (instance {{
        $labels.instance }})
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
