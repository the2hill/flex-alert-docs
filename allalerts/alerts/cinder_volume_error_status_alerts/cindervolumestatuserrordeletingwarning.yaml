groups:
- name: cinder_volume_error_status_alerts
  rules:
  - alert: cindervolumestatuserrordeletingwarning
    labels:
      severity: warning
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: '(openstack_cinder_volume_status{status="error_deleting", job="os-metrics-prometheus-openstack-exporter"}
      offset 4m)

      and

      openstack_cinder_volume_status{status="error_deleting", job="os-metrics-prometheus-openstack-exporter"}

      '
    for: 1m
    annotations:
      description: 'Cinder volume ID: {{ $labels.id }}

        NAME: {{ $labels.name }}

        LABELS: {{ $labels }}'
      summary: Cinder volume with status == error_deleting
      runbook_url: default_runbook_url
      dashboard_url: default_dashboard_url
