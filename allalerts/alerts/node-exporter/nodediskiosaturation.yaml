groups:
- name: node-exporter
  rules:
  - alert: nodediskiosaturation
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: rate(node_disk_io_time_weighted_seconds_total{job="node-exporter", device=~"(/dev/)?(mmcblk.p.+|nvme.+|rbd.+|sd.+|vd.+|xvd.+|dm-.+|md.+|dasd.+)"}[5m])
      > 10
    for: 30m
    annotations:
      description: 'Disk IO queue (aqu-sq) is high on {{ $labels.device }} at {{ $labels.instance
        }}, has been above 10 for the last 30 minutes, is currently at {{ printf "%.2f"
        $value }}.

        This symptom might indicate disk saturation.

        '
      runbook_url: default_runbook_url
      summary: Disk IO queue is high.
      dashboard_url: default_dashboard_url
