groups:
- name: node-exporter
  rules:
  - alert: nodefiledescriptorlimit
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: "(\n  node_filefd_allocated{job=\"node-exporter\"} * 100 / node_filefd_maximum{job=\"\
      node-exporter\"} > 90\n)"
    for: 15m
    annotations:
      description: File descriptors limit at {{ $labels.instance }} is currently at
        {{ printf "%.2f" $value }}%.
      runbook_url: default_runbook_url
      summary: Kernel is predicted to exhaust file descriptors limit soon.
      dashboard_url: default_dashboard_url
