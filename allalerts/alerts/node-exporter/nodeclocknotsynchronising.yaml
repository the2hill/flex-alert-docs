groups:
- name: node-exporter
  rules:
  - alert: nodeclocknotsynchronising
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: 'min_over_time(node_timex_sync_status{job="node-exporter"}[5m]) == 0

      and

      node_timex_maxerror_seconds{job="node-exporter"} >= 16'
    for: 10m
    annotations:
      description: Clock at {{ $labels.instance }} is not synchronising. Ensure NTP
        is configured on this host.
      runbook_url: default_runbook_url
      summary: Clock not synchronising.
      dashboard_url: default_dashboard_url
