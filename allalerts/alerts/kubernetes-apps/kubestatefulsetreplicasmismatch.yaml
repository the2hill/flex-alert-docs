groups:
- name: kubernetes-apps
  rules:
  - alert: kubestatefulsetreplicasmismatch
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: "(\n  kube_statefulset_status_replicas_ready{job=\"kube-state-metrics\"\
      , namespace=~\".*\"}\n    !=\n  kube_statefulset_replicas{job=\"kube-state-metrics\"\
      , namespace=~\".*\"}\n) and (\n  changes(kube_statefulset_status_replicas_updated{job=\"\
      kube-state-metrics\", namespace=~\".*\"}[10m])\n    ==\n  0\n)"
    for: 15m
    annotations:
      description: StatefulSet {{ $labels.namespace }}/{{ $labels.statefulset }} has
        not matched the expected number of replicas for longer than 15 minutes on
        cluster {{ $labels.cluster }}.
      runbook_url: default_runbook_url
      summary: StatefulSet has not matched the expected number of replicas.
      dashboard_url: default_dashboard_url
