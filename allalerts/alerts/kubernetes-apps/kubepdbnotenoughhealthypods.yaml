groups:
- name: kubernetes-apps
  rules:
  - alert: kubepdbnotenoughhealthypods
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: "(\n  kube_poddisruptionbudget_status_desired_healthy{job=\"kube-state-metrics\"\
      , namespace=~\".*\"}\n  -\n  kube_poddisruptionbudget_status_current_healthy{job=\"\
      kube-state-metrics\", namespace=~\".*\"}\n)\n> 0"
    for: 15m
    annotations:
      description: PDB {{ $labels.cluster }}/{{ $labels.namespace }}/{{ $labels.poddisruptionbudget
        }} expects {{ $value }} more healthy pods. The desired number of healthy pods
        has not been met for at least 15m.
      runbook_url: default_runbook_url
      summary: PDB does not have enough healthy pods.
      dashboard_url: default_dashboard_url
