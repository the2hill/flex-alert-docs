groups:
- name: kubernetes-apps
  rules:
  - alert: kubejobfailed
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: kube_job_failed{job="kube-state-metrics", namespace=~".*"}  > 0
    for: 15m
    annotations:
      description: Job {{ $labels.namespace }}/{{ $labels.job_name }} failed to complete.
        Removing failed job after investigation should clear this alert on cluster
        {{ $labels.cluster }}.
      runbook_url: default_runbook_url
      summary: Job failed to complete.
      dashboard_url: default_dashboard_url
