groups:
- name: kubernetes-apps
  rules:
  - alert: kubepodcrashlooping
    labels:
      rackspace_com_coreAccountID: default_coreID
      rackspace_com_overseerID: default_overseerID
      severity: warning
      group_name: default_group_name
      node_name: default_node_name
      pod_name: default_pod_name
    expr: max_over_time(kube_pod_container_status_waiting_reason{reason="CrashLoopBackOff",
      job="kube-state-metrics", namespace=~".*"}[5m]) >= 1
    for: 15m
    annotations:
      description: 'Pod {{ $labels.namespace }}/{{ $labels.pod }} ({{ $labels.container
        }}) is in waiting state (reason: "CrashLoopBackOff") on cluster {{ $labels.cluster
        }}.'
      runbook_url: default_runbook_url
      summary: Pod is crash looping.
      dashboard_url: default_dashboard_url
