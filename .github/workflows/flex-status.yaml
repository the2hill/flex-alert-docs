name: Sync Rackspace OpenStack Flex Status

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch-status:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch OpenStack Flex status
        run: python3 .github/workflows/flex-status.py --output docs/flex-status.json

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/flex-status.json
          git diff --cached --quiet && echo "No changes." || (
            git commit -m "chore: sync rackspace openstack flex status [skip ci]"
            git push
          )
